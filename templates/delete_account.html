<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Delete Account | 4 Elements</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: #f8fdf9;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box {
            background: #fff;
            padding: 35px 40px;
            max-width: 480px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #c62828;
        }

        p {
            font-size: 0.95rem;
            color: #444;
        }

        .btn-row {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: #e0f2f1;
            color: #00695c;
        }

        .btn-delete {
            background: #e53935;
            color: #fff;
        }

        .btn-cancel:hover {
            background: #b2dfdb;
        }

        .btn-delete:hover {
            background: #c62828;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Delete Your Account</h1>
        <p>
            Are you sure you want to delete your account
            <strong>{{ name }}</strong>? This action cannot be undone and your login
            data will be removed from our system.
        </p>

        <div class="btn-row">
            <a href="{{ url_for('account') }}">
                <button type="button" class="btn btn-cancel">Cancel</button>
            </a>

            <form action="{{ url_for('delete_account') }}" method="POST" style="margin:0;">
                <button type="submit" class="btn btn-delete">Yes, delete my account</button>
            </form>
        </div>
    </div>
</body>

</html>
