<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Volunteers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_index.css') }}">
    <style>
        body { background: #f4faf6; font-family: "Poppins", sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .form-container { width: 500px; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; }
        button { width: 100%; padding: 12px; background: #2e8f55; color: white; border: none; border-radius: 25px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 style="text-align:center; color:#2e8f55;">Request Volunteers</h2>
        <form action="{{ url_for('submit_request_volunteers') }}" method="POST">
            <input type="text" name="task_title" placeholder="Task Title" required>
            <input type="number" name="needed_people" placeholder="Volunteers Needed" required>
            <input type="date" name="task_date" required>
            
            <label style="font-size:12px; color:#666; margin-top:10px; display:block;">Task Criticality (Affects Points Awarded)</label>
            <select name="urgency">
                <option value="Low">Low (Standard Points)</option>
                <option value="Medium" selected>Medium (1.5x Points)</option>
                <option value="High">High (2x Points)</option>
                <option value="Critical">Critical (3x Points)</option>
            </select>
            
            <select name="duration">
                <option>1 Hour</option><option>2 Hours</option><option>4 Hours</option><option>Full Day</option>
            </select>
            <textarea name="description" placeholder="Description" rows="4"></textarea>
            <button type="submit">Post Opportunity</button>
            <div style="text-align:center; margin-top:15px;"><a href="/account_donor" style="color:#666; text-decoration:none;">Back</a></div>
        </form>
    </div>
</body>
</html>
