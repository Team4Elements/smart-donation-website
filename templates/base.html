<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Elements</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: #f4faf6;
            font-family: "Poppins", sans-serif;
            color: #1e3f2e;
        }
        /* NAVBAR */
        
        nav {
            width: 100%;
            padding: 16px 7%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(30, 63, 46, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        nav .logo {
            font-size: 22px;
            font-weight: 700;
            color: #2e8f55;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        nav .logo i {
            color: #2e8f55;
        }
        
        nav a {
            color: #345f47;
            text-decoration: none;
            margin-left: 18px;
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        nav a:hover {
            color: #2e8f55;
        }
        
        .nav-right a {
            padding: 8px 18px;
            border-radius: 999px;
            border: 1px solid #2e8f55;
            color: #2e8f55;
            text-decoration: none;
            font-size: 0.85rem;
            margin-left: 12px;
        }
        
        .nav-right a:hover {
            background: #2e8f55;
            color: white;
        }
        /* CONTENT */
        
        .content-wrapper {
            padding: 40px 7%;
            min-height: 70vh;
        }
        /* FOOTER */
        
        footer {
            text-align: center;
            padding: 18px 0 28px;
            border-top: 1px solid rgba(30, 63, 46, 0.15);
            background: white;
            color: #6b8576;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">
            <i class="fa-solid fa-crown"></i> 4 Elements
        </div>

        <div class="nav-right">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('projects') }}">Projects</a>
            <a href="{{ url_for('account_donor') }}">Dashboard</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <!-- FOOTER -->
    <footer>
        © 2025 4 Elements — Empowering communities with smart donations.
    </footer>

</body>

</html>
