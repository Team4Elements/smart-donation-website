<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volunteer Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container small">
        <form action="{{ url_for('volunteer_signup') }}" method="POST">
            <h1>Volunteer Registration</h1>
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number (Optional)">
            <select name="role_id" required style="width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #cfe7d5;">
                <option value="" disabled selected>Choose a Volunteer Role...</option>
                {% for role in roles %}
                <option value="{{ role[0] }}">{{ role[1] }}</option>
                {% endfor %}
            </select>
            <button type="submit">Submit Application</button>
            <a href="{{ url_for('donate_time') }}">Back to Roles</a>
        </form>
    </div>
</body>
</html>
