<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Volunteer Sign Up | 4Elements</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_index.css') }}">
    <style>
        body {
            background: #f4faf6;
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
        }
        
        .form-wrapper {
            max-width: 750px;
            margin: 50px auto;
            background: #ffffff;
            border-radius: 24px;
            padding: 30px 30px 32px;
            box-shadow: 0 12px 35px rgba(15, 23, 42, 0.13);
            animation: fadeIn 0.7s ease;
        }
        
        h2 {
            margin: 0 0 6px;
            font-size: 24px;
            color: #214f3a;
        }
        
        p {
            margin: 0 0 18px;
            font-size: 13px;
            color: #738679;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #244e3b;
            margin-top: 14px;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #d7e6db;
            background: #f9fdf9;
            font-size: 14px;
            font-family: "Open Sans", sans-serif;
            transition: 0.25s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--main-green);
            box-shadow: 0 0 6px rgba(0, 140, 80, 0.15);
            outline: none;
        }
        
        button {
            margin-top: 22px;
            padding: 12px 20px;
            border-radius: 999px;
            border: none;
            background: var(--main-green);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }
        
        button:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(22px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="form-wrapper">
        <h2>Volunteer Sign Up</h2>
        <p>Share your details and we’ll connect you with the right opportunity.</p>

        <form action="{{ url_for('volunteer_signup') }}" method="POST">
            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Phone (optional)</label>
            <input type="text" name="phone">

            <label>Role</label>
            <select name="role_id">
            {% for r in roles %}
                <option value="{{ r[0] }}">{{ r[1] }}</option>
            {% endfor %}
        </select>

            <label>Additional Notes (optional)</label>
            <textarea name="notes" rows="3"></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

</body>

</html>
